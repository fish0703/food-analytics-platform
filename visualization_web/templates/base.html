<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}餐饮大数据分析平台{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <!-- ECharts 5.x 不再内置中国地图，需从 DataV GeoJSON 注册 -->
    <script>
    (function() {
        if (window._chinaMapRegistered) return;
        window._chinaMapRegistered = true;
        window._chinaMapPromise = fetch('https://geo.datav.aliyun.com/areas_v3/bound/100000_full.json')
            .then(r => r.json())
            .then(geo => {
                echarts.registerMap('china', geo);
                return true;
            })
            .catch(err => {
                console.error('中国地图 GeoJSON 加载失败:', err);
                window._chinaMapFailed = true;
            });
    })();
    </script>
    <style>
        :root {
            --primary: #c97d60;
            --primary-deep: #a06243;
            --primary-light: #e8c4b0;
            --primary-ghost: #faf0ea;
            --bg: #fefaf6;
            --surface: #ffffff;
            --text: #4a3728;
            --text-secondary: #8b7355;
            --text-muted: #b0a090;
            --border: #e8ddd0;
            --shadow-sm: 0 1px 3px rgba(140, 100, 70, 0.06);
            --shadow-md: 0 4px 20px rgba(140, 100, 70, 0.10);
            --radius: 12px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* ── 导航栏 ── */
        .navbar {
            background: linear-gradient(135deg, #c97d60 0%, #b5674a 40%, #a06243 100%);
            color: white;
            padding: 0 28px;
            display: flex;
            align-items: center;
            height: 58px;
            box-shadow: 0 2px 24px rgba(160, 100, 65, 0.18);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .navbar .brand {
            font-family: 'Noto Serif SC', 'PingFang SC', 'Microsoft YaHei', serif;
            font-size: 20px;
            font-weight: 700;
            margin-right: 40px;
            letter-spacing: 0.5px;
        }
        .navbar a {
            color: rgba(255,255,255,0.82);
            text-decoration: none;
            padding: 8px 18px;
            border-radius: 8px;
            margin: 0 3px;
            font-size: 14px;
            font-weight: 500;
            transition: all var(--transition);
        }
        .navbar a:hover {
            background: rgba(255,255,255,0.15);
            color: #fff;
        }
        .navbar a.active {
            background: rgba(255,255,255,0.22);
            color: #fff;
            font-weight: 600;
        }

        /* ── 容器 ── */
        .container { max-width: 1400px; margin: 0 auto; padding: 24px 20px; }

        /* ── 页面标题 ── */
        .page-title {
            font-family: 'Noto Serif SC', 'PingFang SC', 'Microsoft YaHei', serif;
            font-size: 26px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 24px;
            padding-left: 16px;
            border-left: 4px solid var(--primary);
            letter-spacing: 1px;
        }

        /* ── 卡片 ── */
        .card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            transition: box-shadow var(--transition);
        }
        .card:hover {
            box-shadow: var(--shadow-md);
        }
        .card-title {
            font-family: 'Noto Serif SC', 'PingFang SC', 'Microsoft YaHei', serif;
            font-size: 16px;
            font-weight: 700;
            color: var(--text-secondary);
            margin-bottom: 14px;
            letter-spacing: 0.5px;
        }

        /* ── 统计卡片网格 ── */
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 24px 20px 20px;
            text-align: center;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
            transition: transform var(--transition), box-shadow var(--transition);
        }
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--primary-light));
        }
        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }
        .stat-card .number {
            font-family: 'Noto Serif SC', 'PingFang SC', serif;
            font-size: 34px;
            font-weight: 700;
            color: var(--primary);
            line-height: 1.2;
        }
        .stat-card .label {
            color: var(--text-secondary);
            margin-top: 6px;
            font-size: 13px;
            letter-spacing: 0.5px;
        }

        /* ── 图表行 ── */
        .chart-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .chart-row .chart-box {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 20px 16px 16px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            transition: box-shadow var(--transition);
        }
        .chart-row .chart-box:hover {
            box-shadow: var(--shadow-md);
        }
        .chart-row .chart-box.full { grid-column: 1 / -1; }

        @media (max-width: 768px) {
            .chart-row { grid-template-columns: 1fr; }
            .navbar { padding: 0 12px; }
            .navbar .brand { font-size: 17px; margin-right: 16px; }
            .navbar a { padding: 6px 10px; font-size: 13px; }
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <span class="brand">🍜 餐饮大数据分析</span>
        <a href="/" class="{{ 'active' if request.path == '/' }}">首页</a>
        <a href="/city-map" class="{{ 'active' if request.path == '/city-map' }}">城市分布</a>
        <a href="/food-preference" class="{{ 'active' if request.path == '/food-preference' }}">美食偏好</a>
        <a href="/review-analysis" class="{{ 'active' if request.path == '/review-analysis' }}">评价分析</a>
        <a href="/taste-trend" class="{{ 'active' if request.path == '/taste-trend' }}">口味趋势</a>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
